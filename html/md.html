    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --accent-color: #6e40c9;
            /* Markdown/Github Purple */
        }

        @media print {

            header,
            footer,
            .search-bar {
                display: none !important;
            }

            body {
                padding-top: 0;
            }

            main {
                columns: 2 !important;
                padding: 0;
            }

            .card {
                break-inside: avoid;

            }

<body>
    <header>

            <div class="brand">

            <nav class="app-tabs">
                <a href="index.html" class="app-tab">Excel (Win)</a>
                <a href="sheets.html" class="app-tab">Google Sheets</a>

            <div class="actions">
                <button onclick="window.print()"
                    style="padding: 8px 16px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-size: 0.875rem; font-weight: 500;">

    <main id="shortcutGrid">

    <footer>
